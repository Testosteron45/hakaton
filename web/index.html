<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="krasnodar_travel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Краснодар</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #1E6B4F 0%, #4CAF7D 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      color: white;
    }
    #splash .icon { font-size: 64px; }
    #splash .title {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    #splash .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="icon">🏙️</div>
    <div class="title">Куда пойти в Краснодаре?</div>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window._flutter = {
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine();
        document.getElementById('splash').style.display = 'none';
        await appRunner.runApp();
      }
    };
  </script>
</body>
</html>
